{% extends 'base.html' %}

{% block content %}
<style>
    .appointment-card {
        border-radius: 20px;
        border: none;
        box-shadow: 0 10px 30px rgba(0,0,0,0.08) !important;
        overflow: hidden;
    }
    .appointment-header {
        background: linear-gradient(45deg, #1E3A8A, #3B82F6);
        color: white;
        padding: 2rem;
    }
    .form-label {
        font-weight: 600;
        color: #4B5563;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .form-select, .form-control {
        border-radius: 12px;
        padding: 0.75rem;
        border: 1px solid #E5E7EB;
    }
    .form-select:focus {
        border-color: #3B82F6;
        box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
    }
    .btn-confirm {
        background: #1E3A8A;
        border: none;
        padding: 1rem;
        font-weight: 700;
        border-radius: 12px;
        transition: all 0.3s;
    }
    .btn-confirm:hover {
        background: #3B82F6;
        transform: translateY(-2px);
    }
    .step-indicator {
        width: 30px;
        height: 30px;
        background: #3B82F6;
        color: white;
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 0.8rem;
        margin-right: 10px;
    }
</style>

<div class="row justify-content-center py-4">
    <div class="col-lg-6">
        <div class="card appointment-card animate__animated animate__fadeInUp">
            <div class="appointment-header text-center">
                <i class="fas fa-calendar-plus fa-3x mb-3"></i>
                <h3 class="mb-0 fw-bold">Agendar Nueva Cita</h3>
                <p class="small opacity-75 mb-0">Selecciona tu especialista y horario preferido</p>
            </div>

            <div class="card-body p-4 p-md-5">
                <form method="post" id="form-cita">
                    {% csrf_token %}
                    
                    <div class="mb-4">
                        <label class="form-label">
                            <span class="step-indicator">1</span> Profesional de Salud
                        </label>
                        <select name="professional" id="id_profesional" class="form-select" required>
                            <option value="">Seleccione un especialista...</option>
                            {% for p in profesionales %}
                                <option value="{{ p.id }}">{{ p.nombre }} - {{ p.especialidad }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">
                            <span class="step-indicator">2</span> Fecha de la Cita
                        </label>
                        <input type="date" name="fecha" id="id_fecha" class="form-control" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">
                            <span class="step-indicator">3</span> Hora Disponible
                        </label>
                        <select name="hora" id="id_hora" class="form-select" required>
                            <option value="">Primero seleccione profesional y fecha</option>
                            <optgroup label="Mañana">
                                <option value="08:00">08:00 AM</option>
                                <option value="08:30">08:30 AM</option>
                                <option value="09:00">09:00 AM</option>
                                <option value="09:30">09:30 AM</option>
                                <option value="10:00">10:00 AM</option>
                            </optgroup>
                            <optgroup label="Tarde">
                                <option value="14:00">02:00 PM</option>
                                <option value="14:30">02:30 PM</option>
                                <option value="15:00">03:00 PM</option>
                                <option value="15:30">03:30 PM</option>
                            </optgroup>
                        </select>
                    </div>
                    
                    <div class="alert alert-warning border-0 bg-warning bg-opacity-10 py-3 mb-4" style="border-radius: 12px;">
                        <div class="d-flex align-items-center">
                            <i class="fas fa-info-circle me-3 text-warning fa-lg"></i>
                            <span class="small text-dark">Las horas marcadas como <strong>(OCUPADO)</strong> ya han sido reservadas por otro paciente.</span>
                        </div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-confirm shadow">
                            Confirmar Agendamiento <i class="fas fa-check-circle ms-2"></i>
                        </button>
                        <a href="{% url 'dashboard_cliente' %}" class="btn btn-link text-muted text-decoration-none text-center">
                            <i class="fas fa-arrow-left me-1"></i> Regresar al panel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const selectProf = document.getElementById('id_profesional');
    const inputFecha = document.getElementById('id_fecha');
    const selectHora = document.getElementById('id_hora');

    // Bloquear fechas pasadas
    const today = new Date().toISOString().split("T")[0];
    inputFecha.min = today;

    function verificarHoras() {
        const pId = selectProf.value;
        const fVal = inputFecha.value;

        if (pId && fVal) {
            // Animación de carga opcional aquí
            fetch(`/api/horas-ocupadas/?profesional_id=${pId}&fecha=${fVal}`)
                .then(response => response.json())
                .then(data => {
                    const ocupadas = data.horas_ocupadas;
                    
                    Array.from(selectHora.options).forEach(opt => {
                        if (opt.value === "") return;

                        if (ocupadas.includes(opt.value)) {
                            opt.disabled = true;
                            opt.text = opt.value + " - (OCUPADO 🚩)";
                            opt.style.backgroundColor = "#FEE2E2"; // Rojo suave
                            opt.style.color = "#991B1B";
                        } else {
                            opt.disabled = false;
                            opt.text = opt.value;
                            opt.style.backgroundColor = "#FFFFFF";
                            opt.style.color = "#000";
                        }
                    });
                });
        }
    }

    selectProf.addEventListener('change', verificarHoras);
    inputFecha.addEventListener('change', verificarHoras);
});
</script>
{% endblock %}
