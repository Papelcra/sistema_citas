{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Mis Citas</h2>
    <a href="{% url 'agendar_cita' %}" class="btn btn-primary">+ Agendar Nueva Cita</a>
</div>

<div class="card shadow">
    <div class="card-body">
        <table class="table table-hover">
            <thead class="table-dark">
                <tr>
                    <th>Fecha</th>
                    <th>Hora</th>
                    <th>Profesional</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody>
                {% for cita in citas %}
                <tr>
                    <td>{{ cita.fecha }}</td>
                    <td>{{ cita.hora }}</td>
                    <td>{{ cita.profesional.nombre }}</td>
                    <td>
                        <span class="badge 
                            {% if cita.estado == 'PEN' %}bg-warning
                            {% elif cita.estado == 'CON' %}bg-success
                            {% else %}bg-secondary{% endif %}">
                            {{ cita.get_estado_display }}
                        </span>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="4" class="text-center">No tienes citas programadas.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
