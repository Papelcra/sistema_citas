services:
  # Configuración del Servicio Web
  - type: web
    name: sistema-citas-web
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application" 
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.2
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      # Esta línea conecta el servicio web con la base de datos que definimos abajo
      - key: DATABASE_URL
        fromDatabase:
          name: sistema-citas-db
          property: connectionString

  # Configuración de la Base de Datos
  - type: database
    name: sistema-citas-db
    databaseName: citas_db
    user: julian 
    plan: free